<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KBBI | WINYUK </title>
    
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --bg: #030303;
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.1);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --text-muted: #888;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #030303 100%);
        }

        /* --- PRELOADER (ULTRA SMOOTH) --- */
        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .loader-logo {
            font-family: 'Marcellus', serif;
            font-size: 2rem; color: var(--gold);
            letter-spacing: 10px; text-transform: uppercase;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 1rem 5%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100;
        }

        .logo {
            font-family: 'Marcellus', serif; font-size: 1.4rem;
            letter-spacing: 2px; color: var(--gold);
        }

        /* --- MAIN CONTAINER --- */
        .container { 
            width: 100%; max-width: 1200px; 
            margin: 0 auto; padding: 2rem 5%; 
        }

        .hero { text-align: center; margin-bottom: 3rem; }
        .hero h1 { 
            font-family: 'Marcellus', serif; font-size: clamp(2rem, 8vw, 3.5rem); 
            margin-bottom: 0.5rem; background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- PREMIUM SEARCH BOX (RESPONSIVE) --- */
        .search-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 2rem; border-radius: 24px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 2rem; backdrop-filter: blur(10px);
        }

        .input-wrap { display: flex; flex-direction: column; gap: 8px; }
        .input-wrap label { 
            font-size: 0.65rem; color: var(--gold); 
            text-transform: uppercase; letter-spacing: 2px; font-weight: 600;
        }

        input {
            width: 100%; background: rgba(255,255,255,0.02);
            border: 1px solid var(--border); padding: 14px 20px;
            border-radius: 12px; color: #fff; font-size: 1rem;
            outline: none; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.06); }

        /* --- GRID HASIL (RAPI DI HP) --- */
        .stats-bar { 
            text-align: center; margin-bottom: 1.5rem; 
            font-size: 0.8rem; color: var(--text-muted); 
        }

        #word-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .word-item {
            background: var(--glass); border: 1px solid var(--border);
            padding: 16px; border-radius: 14px; text-align: center;
            font-size: 0.95rem; font-weight: 500; opacity: 0;
            transform: translateY(10px); transition: 0.3s;
        }

        .word-item:active { background: var(--gold); color: #000; transform: scale(0.95); }

        @media (hover: hover) {
            .word-item:hover {
                background: var(--gold); color: #000;
                transform: translateY(-5px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            }
        }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 600px) {
            nav { padding: 1rem 6%; }
            .container { padding: 1.5rem 6%; }
            .search-card { 
                grid-template-columns: 1fr; /* Stack input di HP */
                padding: 1.5rem; gap: 1rem;
                border-radius: 20px;
            }
            #word-grid {
                grid-template-columns: repeat(2, 1fr); /* 2 Kolom rapi di HP */
                gap: 10px;
            }
            .word-item { padding: 12px; font-size: 0.85rem; }
        }

        .status-msg {
            grid-column: 1 / -1; padding: 3rem 1rem; text-align: center;
            color: var(--text-muted); font-size: 0.9rem;
            border: 1px dashed var(--border); border-radius: 20px;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader-logo" id="loader-text">KBBI WINYUK</div>
    </div>

    <nav>
        <div class="logo">WINYUK.</div>
        <div id="word-count" style="font-size: 0.6rem; color: var(--gold); letter-spacing: 1px;">SINKRONISASI...</div>
    </nav>

    <main class="container">
        <header class="hero">
            <h1>Cari Kata.</h1>
            <p style="font-size: 0.85rem; color: var(--text-muted);">Database 140.000+ Kosakata Bahasa Indonesia</p>
        </header>

        <section class="search-card">
            <div class="input-wrap">
                <label>Awalan</label>
                <input type="text" id="awalan" placeholder="Misal: e" autocomplete="off" disabled>
            </div>
            <div class="input-wrap">
                <label>Akhiran</label>
                <input type="text" id="akhiran" placeholder="Misal: g" autocomplete="off" disabled>
            </div>
        </section>

        <div class="stats-bar" id="info-text">Menghubungkan ke database...</div>

        <div id="word-grid">
            </div>
    </main>

    <script>
        let dbKata = [];
        const inputAwalan = document.getElementById('awalan');
        const inputAkhiran = document.getElementById('akhiran');
        const grid = document.getElementById('word-grid');
        const labelCount = document.getElementById('word-count');
        const labelInfo = document.getElementById('info-text');

        const DATABASE_URLS = [
            'https://raw.githubusercontent.com/damzaky/kumpulan-kata-bahasa-indonesia-KBBI/master/list_1.0.0.txt',
            'https://raw.githubusercontent.com/sastrawi/sastrawi/master/data/kata-dasar.txt'
        ];

        async function initApp() {
            try {
                // GSAP Intro
                gsap.from("#loader-text", { opacity: 0, y: 20, duration: 1, ease: "power3.out" });

                const startTime = Date.now();
                const responses = await Promise.all(DATABASE_URLS.map(url => fetch(url).then(r => r.text())));
                
                let combined = [];
                responses.forEach(data => {
                    const lines = data.split('\n')
                        .map(k => k.trim().toLowerCase())
                        .filter(k => k.length > 0 && !k.includes(' ') && !k.includes('-'));
                    combined = [...combined, ...lines];
                });

                dbKata = [...new Set(combined)].sort();

                const loadTime = Date.now() - startTime;
                const minWait = 1800;
                
                setTimeout(() => {
                    gsap.to("#loading-overlay", { 
                        opacity: 0, 
                        duration: 0.8, 
                        onComplete: () => {
                            document.getElementById('loading-overlay').style.display = 'none';
                            inputAwalan.disabled = false;
                            inputAkhiran.disabled = false;
                            labelCount.textContent = `${dbKata.length.toLocaleString()} KATA`;
                            labelInfo.textContent = "Masukkan awalan atau akhiran";
                        }
                    });
                }, loadTime < minWait ? minWait - loadTime : 0);

            } catch (err) {
                labelInfo.textContent = "Gagal memuat data. Periksa internet.";
            }
        }

        function filterData() {
            const pre = inputAwalan.value.toLowerCase().trim();
            const suf = inputAkhiran.value.toLowerCase().trim();

            const filtered = dbKata.filter(k => {
                return (pre === "" || k.startsWith(pre)) && (suf === "" || k.endsWith(suf));
            });

            renderGrid(filtered);
        }

        function renderGrid(list) {
            grid.innerHTML = "";
            const LIMIT = 80;
            const shown = list.slice(0, LIMIT);

            if (list.length === 0) {
                grid.innerHTML = `<div class="status-msg">Tidak ada kata tunggal yang ditemukan.</div>`;
                labelInfo.textContent = "0 kata ditemukan";
                return;
            }

            labelInfo.textContent = `${list.length.toLocaleString()} kata ditemukan ${list.length > LIMIT ? `(Tampil ${LIMIT})` : ''}`;

            shown.forEach((word, i) => {
                const card = document.createElement('div');
                card.className = 'word-item';
                card.textContent = word;
                grid.appendChild(card);

                gsap.to(card, {
                    opacity: 1,
                    y: 0,
                    duration: 0.4,
                    delay: (i % 20) * 0.03, // Efek gelombang mengalir
                    ease: "power2.out"
                });
            });
        }

        inputAwalan.addEventListener('input', filterData);
        inputAkhiran.addEventListener('input', filterData);

        initApp();
    </script>
</body>
</html>
