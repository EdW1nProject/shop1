<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBBI WinYuk | Eksplorasi Kata</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --bg: #050505;
            --gold: #d4af37;
            --gold-soft: rgba(212, 175, 55, 0.15);
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #71717a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- LOADING OVERLAY --- */
        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .loader-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; color: var(--gold);
            letter-spacing: 4px; animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* --- BACKGROUND DECOR --- */
        .ambient {
            position: fixed; width: 50vw; height: 50vw;
            background: radial-gradient(circle, var(--gold-soft) 0%, transparent 70%);
            top: -20%; right: -10%; z-index: -1; pointer-events: none;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 2rem 8%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif; font-size: 1.8rem;
            background: linear-gradient(90deg, #fff, var(--gold), #fff);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: shine 5s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* --- MAIN CONTENT --- */
        .container { max-width: 1000px; margin: 4rem auto; padding: 0 2rem; }

        .hero-section { text-align: center; margin-bottom: 4rem; }
        .hero-section h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 1rem; }
        .hero-section p { color: var(--text-dim); letter-spacing: 1px; }

        /* --- SEARCH PANEL --- */
        .search-panel {
            background: var(--glass); border: 1px solid var(--border);
            padding: 40px; border-radius: 40px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            margin-bottom: 3rem;
        }

        .input-group { position: relative; }
        .input-group label {
            display: block; font-size: 0.7rem; color: var(--gold);
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; font-weight: 600;
        }

        input {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); padding: 18px 25px;
            border-radius: 16px; color: #fff; font-size: 1.2rem;
            outline: none; transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }
        input:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- WORD GRID --- */
        .stats { text-align: center; margin-bottom: 2rem; font-size: 0.9rem; color: var(--gold); font-weight: 600; }

        #word-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .word-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 20px; border-radius: 18px; text-align: center;
            font-size: 1.1rem; transition: 0.5s; opacity: 0;
        }

        .word-card:hover {
            background: var(--gold); color: #000;
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2);
        }

        .status-box {
            grid-column: 1 / -1; padding: 40px; text-align: center;
            background: var(--glass); border-radius: 20px; border: 1px dashed var(--gold);
            color: var(--text-dim); line-height: 1.8;
        }

        @media (max-width: 650px) {
            .search-panel { grid-template-columns: 1fr; padding: 25px; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader-text">LOADING...</div>
    </div>

    <div class="ambient"></div>

    <nav>
        <div class="logo">KBBI.WINYUK</div>
        <div id="word-count" style="font-size: 0.8rem; color: var(--text-dim); letter-spacing: 1px;">0 kata terunduh</div>
    </nav>

    <main class="container">
        <div class="hero-section">
            <h1>Eksplorasi <span style="font-style: italic; color: var(--gold);">Kosakata.</span></h1>
            <p>Database 140.000+ kata dasar Indonesia.</p>
        </div>

        <div class="search-panel">
            <div class="input-group">
                <label>Berdasar Awalan</label>
                <input type="text" id="awalan" placeholder="Contoh: e" disabled>
            </div>
            <div class="input-group">
                <label>Berdasar Akhiran</label>
                <input type="text" id="akhiran" placeholder="Contoh: g" disabled>
            </div>
        </div>

        <div class="stats" id="info-status">Siap menjelajah</div>

        <div id="word-grid">
            </div>
    </main>

    <script>
        let dbKata = []; 

        const inputAwalan = document.getElementById('awalan');
        const inputAkhiran = document.getElementById('akhiran');
        const wadahGrid = document.getElementById('word-grid');
        const teksJumlahKata = document.getElementById('word-count');
        const teksInfoStatus = document.getElementById('info-status');
        const loadingOverlay = document.getElementById('loading-overlay');

        const SUMBER_DATABASE = [
            'https://raw.githubusercontent.com/damzaky/kumpulan-kata-bahasa-indonesia-KBBI/master/list_1.0.0.txt',
            'https://raw.githubusercontent.com/sastrawi/sastrawi/master/data/kata-dasar.txt'
        ];

        async function ambilDanGabungkanData() {
            try {
                const waktuMulai = Date.now();

                const penampungData = await Promise.all(
                    SUMBER_DATABASE.map(url => fetch(url).then(res => res.text()))
                );

                let semuaKataGabungan = [];

                penampungData.forEach(teksData => {
                    const kataDariSumber = teksData.split('\n')
                        .map(kata => kata.trim().toLowerCase())
                        .filter(kata => 
                            kata.length > 0 &&
                            kata.indexOf(' ') === -1 && 
                            !kata.includes('-')
                        );
                    
                    semuaKataGabungan = semuaKataGabungan.concat(kataDariSumber);
                });

                dbKata = [...new Set(semuaKataGabungan)].sort();

                const waktuSelesai = Date.now() - waktuMulai;
                const JEDA_MINIMAL = 2000; 

                if (waktuSelesai < JEDA_MINIMAL) {
                    await new Promise(resolve => setTimeout(resolve, JEDA_MINIMAL - waktuSelesai));
                }

                // Sembunyikan Loader dengan GSAP
                gsap.to(loadingOverlay, { opacity: 0, duration: 1, onComplete: () => {
                    loadingOverlay.style.display = 'none';
                    inputAwalan.disabled = false;
                    inputAkhiran.disabled = false;
                    teksJumlahKata.textContent = `${dbKata.length.toLocaleString()} kata tersedia`;
                    saringKata();
                }});

            } catch (error) {
                console.error(error);
                wadahGrid.innerHTML = `
                    <div class="status-box" style="border-color: #ef4444; color: #ef4444;">
                        <strong>❌ Akses Database Terganggu</strong><br>
                        Pastikan koneksi internet aktif untuk menarik data dari repositori GitHub.
                    </div>
                `;
                loadingOverlay.style.display = 'none';
            }
        }

        function saringKata() {
            const awalan = inputAwalan.value.toLowerCase().trim();
            const akhiran = inputAkhiran.value.toLowerCase().trim();

            const hasilFilter = dbKata.filter(kata => {
                const cocokAwalan = awalan === "" || kata.startsWith(awalan);
                const cocokAkhiran = akhiran === "" || kata.endsWith(akhiran);
                return cocokAwalan && cocokAkhiran;
            });

            tampilkanKeLayar(hasilFilter);
        }

        function tampilkanKeLayar(daftarKata) {
            wadahGrid.innerHTML = "";
            const MAKSIMAL_TAMPIL = 100; // Dikurangi agar animasi GSAP tetap lancar
            const totalDitemukan = daftarKata.length;

            if (totalDitemukan === 0) {
                teksInfoStatus.textContent = `0 kata ditemukan`;
                wadahGrid.innerHTML = `
                    <div class="status-box">
                        <strong>Kombinasi Tidak Ditemukan</strong><br>
                        Cobalah huruf awalan atau akhiran yang berbeda.
                    </div>
                `;
                return;
            }

            teksInfoStatus.textContent = `${totalDitemukan.toLocaleString()} kata ditemukan ${totalDitemukan > MAKSIMAL_TAMPIL ? '(Hanya 100 ditampilkan)' : ''}`;

            const kataYangDitampilkan = daftarKata.slice(0, MAKSIMAL_TAMPIL);

            kataYangDitampilkan.forEach((kata, index) => {
                const elemenKartu = document.createElement('div');
                elemenKartu.className = 'word-card';
                elemenKartu.textContent = kata;
                wadahGrid.appendChild(elemenKartu);

                // Animasi GSAP Stagger
                gsap.to(elemenKartu, {
                    opacity: 1,
                    y: 0,
                    duration: 0.5,
                    delay: index * 0.02,
                    ease: "power2.out"
                });
            });
        }

        inputAwalan.addEventListener('input', saringKata);
        inputAkhiran.addEventListener('input', saringKata);

        ambilDanGabungkanData();
    </script>
</body>
</html>
