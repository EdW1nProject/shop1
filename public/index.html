<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBBI PRO | Exclusive Lexicon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --bg: #050505;
            --gold: #d4af37;
            --gold-light: #f1d592;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.15);
            --text-muted: #71717a;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- LUXURY BACKGROUND --- */
        .ambient-light {
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.07) 0%, transparent 70%);
            top: -200px; right: -200px; z-index: -1;
            pointer-events: none;
        }

        /* --- PRELOADER --- */
        #loader {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 2rem 8%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        /* --- SEARCH SECTION --- */
        .main-content {
            max-width: 900px; margin: 4rem auto; padding: 0 2rem;
        }

        .header-text { text-align: center; margin-bottom: 3rem; }
        .header-text h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 1rem; }

        .search-panel {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 40px; border-radius: 40px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .input-group { position: relative; }
        .input-group label {
            display: block; font-size: 0.75rem; color: var(--gold);
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;
            font-weight: 600;
        }

        input {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 18px 25px; border-radius: 15px; color: white;
            font-size: 1.2rem; outline: none; transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        input:focus {
            border-color: var(--gold);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        /* --- RESULTS --- */
        #status-bar {
            text-align: center; margin-top: 25px; font-size: 0.8rem;
            color: var(--text-muted); letter-spacing: 1px;
        }

        .results-area {
            margin-top: 50px; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .word-item {
            background: var(--card); border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; text-align: center;
            font-weight: 500; cursor: pointer; transition: 0.5s;
            opacity: 0; transform: translateY(20px);
        }

        .word-item:hover {
            background: var(--gold); color: black;
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3);
        }

        @keyframes shine { to { background-position: 200% center; } }

        @media (max-width: 600px) {
            .search-panel { grid-template-columns: 1fr; }
            .header-text h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="brand" style="font-size: 1.2rem;">INITIALIZING EXPERIENCE...</div>
    </div>

    <div class="ambient-light"></div>

    <nav>
        <div class="brand">KBBI.PRO</div>
        <div style="font-size: 0.7rem; letter-spacing: 3px; color: var(--gold);">EXCELLENCE IN LANGUAGE</div>
    </nav>

    <main class="main-content">
        <div class="header-text">
            <h1 id="title">Cari Kata <br><span style="font-style: italic; color: var(--gold)">Presisi.</span></h1>
            <p style="color: var(--text-muted);">Sistem filter bahasa tercanggih untuk eksplorasi kata tunggal.</p>
        </div>

        <div class="search-panel">
            <div class="input-group">
                <label>Huruf Awalan</label>
                <input type="text" id="prefix" placeholder="Contoh: e" maxlength="10">
            </div>
            <div class="input-group">
                <label>Huruf Akhiran</label>
                <input type="text" id="suffix" placeholder="Contoh: g" maxlength="10">
            </div>
        </div>

        <div id="status-bar">Menghubungkan ke server repositori bahasa...</div>

        <div class="results-area" id="results">
            </div>
    </main>

    <script>
        let wordsData = [];

        // 1. Loading Animation
        window.onload = () => {
            gsap.to("#loader", { opacity: 0, duration: 1.5, pointerEvents: "none" });
            fetchData();
        };

        // 2. Database Fetching (GitHub + Failover)
        async function fetchData() {
            const status = document.getElementById('status-bar');
            try {
                // Mengambil data dari repositori kata Indonesia yang masif
                const response = await fetch('https://raw.githubusercontent.com/kotatidure/id-words/master/indonesian-words.txt');
                if (!response.ok) throw new Error("CORS or Network Error");
                
                const text = await response.text();
                // Filter: Harus kata tunggal, tidak boleh ada spasi atau '-' (kata ulang)
                wordsData = text.split('\n')
                    .map(w => w.trim().toLowerCase())
                    .filter(w => w.length > 2 && !w.includes(' ') && !w.includes('-'));

                status.innerText = `${wordsData.length.toLocaleString()} Kata Tunggal Terverifikasi.`;
            } catch (err) {
                console.warn("API Error, using local backup...");
                // Backup jika github error (Hanya contoh kecil)
                wordsData = ["elang", "enteng", "emang", "ekosistem", "embung", "endog", "entitas", "elang", "elegi"];
                status.innerText = "Database Lokal Dimuat (Mode Terbatas).";
            }
        }

        // 3. Smart Filtering Logic
        function performSearch() {
            const pre = document.getElementById('prefix').value.toLowerCase().trim();
            const suf = document.getElementById('suffix').value.toLowerCase().trim();
            const container = document.getElementById('results');

            container.innerHTML = "";

            if (!pre && !suf) return;

            const filtered = wordsData.filter(w => {
                const startMatch = pre ? w.startsWith(pre) : true;
                const endMatch = suf ? w.endsWith(suf) : true;
                return startMatch && endMatch;
            }).slice(0, 60); // Ambil 60 teratas agar tetap ringan

            filtered.forEach((word, index) => {
                const div = document.createElement('div');
                div.className = 'word-item';
                div.innerText = word;
                container.appendChild(div);

                // GSAP Entrance Animation
                gsap.to(div, {
                    opacity: 1,
                    y: 0,
                    delay: index * 0.03,
                    duration: 0.6,
                    ease: "power2.out"
                });
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">Tidak ditemukan kata tunggal yang sesuai kriteria.</div>`;
            }
        }

        // Listeners
        document.getElementById('prefix').addEventListener('input', performSearch);
        document.getElementById('suffix').addEventListener('input', performSearch);
    </script>
</body>
</html>
