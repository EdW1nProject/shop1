<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinShop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Background gradient yang lembut */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            color: #333;
        }

        /* HEADER - Efek Glassmorphism */
        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            letter-spacing: 2px;
        }

        header p {
            color: #7f8c8d;
            margin-top: 5px;
        }

        /* PRODUCT GRID */
        .product-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* PRODUCT CARD - Animasi Hover & Bayangan */
        .product-card {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            width: 300px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            /* Transisi yang membuat efek pantulan halus */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            display: block;
        }

        .product-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .image-wrapper {
            width: 100%;
            height: 300px;
            overflow: hidden;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Efek zoom lambat pada gambar saat di-hover */
            transition: transform 0.7s ease;
        }

        .product-card:hover .image-wrapper img {
            transform: scale(1.1);
        }

        .product-info {
            padding: 25px 20px;
            text-align: center;
            background: white;
            position: relative;
        }

        .product-info h2 {
            font-size: 1.2rem;
            color: #2c3e50;
            margin-bottom: 10px;
            transition: color 0.3s ease;
        }

        .product-card:hover .product-info h2 {
            color: #3498db; /* Berubah biru saat di-hover */
        }

        .product-info p {
            color: #e74c3c;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* ANIMASI MASUK (FADE IN UP) */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-down {
            animation: fadeInDown 1s ease forwards;
        }

        .animate-up {
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
        }

        /* Mengatur jeda animasi untuk masing-masing kartu */
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

    </style>
</head>
<body>

    <header class="animate-down">
        <h1>✨ SUPER SHOP ✨</h1>
        <p>Koleksi Terbaik untuk Gaya Kamu</p>
    </header>

    <main class="product-container">
        
        <a href="halaman-produk-1.html" class="product-card animate-up delay-1">
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=500&q=80" alt="Jam Tangan Minimalis">
            </div>
            <div class="product-info">
                <h2>Jam Tangan Minimalis</h2>
                <p>Rp 250.000</p>
            </div>
        </a>

        <a href="halaman-produk-2.html" class="product-card animate-up delay-2">
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=80" alt="Sepatu Sneakers Merah">
            </div>
            <div class="product-info">
                <h2>Sneakers Sport Red</h2>
                <p>Rp 850.000</p>
            </div>
        </a>

        <a href="halaman-produk-3.html" class="product-card animate-up delay-3">
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=500&q=80" alt="Tas Ransel Kulit">
            </div>
            <div class="product-info">
                <h2>Tas Ransel Kulit</h2>
                <p>Rp 420.000</p>
            </div>
        </a>

    </main>

</body>
</html>
