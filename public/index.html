<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBBI Premium Experience | Modern Lexicon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #050505;
            --gold: #c5a059;
            --gold-light: #e2c28d;
            --glass: rgba(255, 255, 255, 0.03);
            --text-muted: #888;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- PRELOADER --- */
        #loader {
            position: fixed; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- BACKGROUND DECOR --- */
        .glow {
            position: fixed; width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.05) 0%, transparent 70%);
            top: -10%; right: -10%; z-index: -1;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 2rem 8%; display: flex; justify-content: space-between;
            align-items: center; position: relative; z-index: 100;
        }

        .logo {
            font-family: 'Marcellus', serif;
            font-size: 1.8rem; letter-spacing: 4px;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* --- SEARCH SECTION --- */
        .container {
            max-width: 900px; margin: 5vh auto; padding: 0 2rem;
            text-align: center;
        }

        .hero-text h1 {
            font-family: 'Marcellus', serif; font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin-bottom: 1rem; opacity: 0; transform: translateY(30px);
        }

        .search-box {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px; border-radius: 20px;
            display: flex; gap: 10px; margin-top: 3rem;
            backdrop-filter: blur(10px);
            transition: 0.4s;
        }

        .search-box:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.1);
        }

        input {
            background: transparent; border: none;
            padding: 15px 20px; color: white; flex: 1;
            font-size: 1.1rem; outline: none;
        }

        .filter-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--gold); padding: 0 15px;
            border-radius: 12px; cursor: pointer;
            outline: none;
        }

        .btn-search {
            background: var(--gold); color: black;
            border: none; padding: 0 30px; border-radius: 12px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        .btn-search:hover { background: var(--gold-light); transform: scale(1.05); }

        /* --- RESULTS SECTION --- */
        #results {
            margin-top: 4rem; text-align: left;
            display: grid; gap: 20px;
        }

        .word-card {
            background: var(--glass); border-left: 3px solid var(--gold);
            padding: 2rem; border-radius: 0 20px 20px 0;
            animation: slideIn 0.6s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .word-card h2 {
            font-family: 'Marcellus', serif; color: var(--gold);
            font-size: 2rem; margin-bottom: 0.5rem;
        }

        .word-card .type {
            font-style: italic; color: var(--text-muted);
            font-size: 0.9rem; margin-bottom: 1rem; display: block;
        }

        .word-card .meaning { line-height: 1.8; color: #ccc; }

        /* --- EMPTY STATE --- */
        .info-msg { color: var(--text-muted); margin-top: 2rem; font-style: italic; }

    </style>
</head>
<body>

    <div id="loader">
        <div class="logo">KBBI.</div>
    </div>

    <div class="glow"></div>

    <nav>
        <div class="logo">LEXICON</div>
        <div style="font-size: 0.7rem; letter-spacing: 2px;">PREMIUM DICTIONARY</div>
    </nav>

    <main class="container">
        <div class="hero-text">
            <h1 id="title">Eksplorasi Bahasa <br><span style="color: var(--gold)">Indonesia.</span></h1>
            <p style="color: var(--text-muted); margin-top: 10px;">Cari makna kata dengan standar kamus besar paling akurat.</p>
        </div>

        <div class="search-box">
            <select id="searchType" class="filter-select">
                <option value="exact">Kata Persis</option>
                <option value="prefix">Awalan (Prefix)</option>
                <option value="suffix">Akhiran (Suffix)</option>
            </select>
            <input type="text" id="keyword" placeholder="Ketik kata yang dicari..." autocomplete="off">
            <button class="btn-search" onclick="searchWord()">CARI</button>
        </div>

        <div id="results">
            <div class="info-msg">Silakan masukkan kata untuk mulai mencari.</div>
        </div>
    </main>

    <script>
        // GSAP Animations on Load
        window.addEventListener('load', () => {
            gsap.to("#loader", { duration: 1, opacity: 0, display: "none", delay: 1 });
            gsap.to("#title", { duration: 1.2, y: 0, opacity: 1, ease: "power4.out", delay: 1.2 });
        });

        async function searchWord() {
            const keyword = document.getElementById('keyword').value.toLowerCase().trim();
            const type = document.getElementById('searchType').value;
            const resultsDiv = document.getElementById('results');

            if (!keyword) return;

            resultsDiv.innerHTML = '<div class="info-msg">Mencari di dalam database...</div>';

            try {
                // Menggunakan API publik KBBI (Open Source Repository)
                // Data diambil dari repositori kamus-indonesia yang komplit
                const response = await fetch(`https://new-kbbi-api.herokuapp.com/cari/${keyword}`);
                const data = await response.json();

                resultsDiv.innerHTML = '';

                if (data.status && data.data.length > 0) {
                    let filteredData = data.data;

                    // Logika Filter Awalan/Akhiran
                    if (type === 'prefix') {
                        filteredData = data.data.filter(item => item.lema.toLowerCase().startsWith(keyword));
                    } else if (type === 'suffix') {
                        filteredData = data.data.filter(item => item.lema.toLowerCase().endsWith(keyword));
                    }

                    if (filteredData.length === 0) {
                        resultsDiv.innerHTML = '<div class="info-msg">Tidak ada kata yang sesuai dengan filter tersebut.</div>';
                        return;
                    }

                    filteredData.forEach((item, index) => {
                        const card = document.createElement('div');
                        card.className = 'word-card';
                        card.style.animationDelay = `${index * 0.1}s`;
                        
                        // Mengambil semua arti jika lebih dari satu
                        const meanings = item.arti.map(a => `<li>${a.deskripsi}</li>`).join('');

                        card.innerHTML = `
                            <h2>${item.lema}</h2>
                            <span class="type">Etimologi / Kelas Kata</span>
                            <div class="meaning">
                                <ul style="list-style-position: inside;">${meanings}</ul>
                            </div>
                        `;
                        resultsDiv.appendChild(card);
                    });
                } else {
                    resultsDiv.innerHTML = '<div class="info-msg">Kata tidak ditemukan dalam database KBBI.</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = '<div class="info-msg">Maaf, terjadi kesalahan koneksi ke database.</div>';
                console.error(error);
            }
        }

        // Fitur Enter untuk mencari
        document.getElementById('keyword').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchWord();
            }
        });
    </script>
</body>
</html>
