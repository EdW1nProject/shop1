<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBBI Premium | Ultimate Filter</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --bg: #080808;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- LUXURY ANIMATED LOGO --- */
        nav { padding: 2rem 8%; text-align: center; border-bottom: 1px solid var(--border); }
        .logo {
            font-family: 'Marcellus', serif; font-size: 2.5rem; letter-spacing: 8px;
            background: linear-gradient(90deg, #fff, var(--gold), #fff);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: shine 5s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- SEARCH AREA --- */
        .search-container {
            max-width: 800px; margin: 50px auto; padding: 0 20px;
        }

        .filter-group {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            background: var(--glass); padding: 30px; border-radius: 30px;
            border: 1px solid var(--border); backdrop-filter: blur(10px);
        }

        .input-box { position: relative; }
        .input-box label {
            display: block; font-size: 0.7rem; color: var(--gold);
            letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase;
        }

        input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; color: white; font-size: 1.2rem;
            outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }

        /* --- RESULTS --- */
        #status { text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--gold); }
        
        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; margin-top: 40px;
        }

        .word-tag {
            background: var(--glass); border: 1px solid var(--border);
            padding: 12px; border-radius: 10px; text-align: center;
            font-size: 1rem; color: #eee; transition: 0.3s;
            cursor: pointer; animation: fadeIn 0.5s ease forwards;
        }

        .word-tag:hover {
            background: var(--gold); color: black; transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* --- LOADING OVERLAY --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: flex;
            justify-content: center; align-items: center; transition: 0.5s;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="logo" style="font-size: 1.5rem;">MEMUAT DATABASE...</div>
    </div>

    <nav>
        <div class="logo">KBBI.ELITE</div>
    </nav>

    <main class="search-container">
        <div class="filter-group">
            <div class="input-box">
                <label>Awalan (Prefix)</label>
                <input type="text" id="prefix" placeholder="Misal: e" maxlength="5">
            </div>
            <div class="input-box">
                <label>Akhiran (Suffix)</label>
                <input type="text" id="suffix" placeholder="Misal: g" maxlength="5">
            </div>
        </div>

        <div id="status">Mengunduh ribuan kata...</div>

        <div class="results-grid" id="results">
            </div>
    </main>

    <script>
        let dictionary = [];

        // 1. Ambil database dari GitHub (Daftar kata KBBI bersih)
        async function loadDatabase() {
            const status = document.getElementById('status');
            try {
                // Menggunakan source raw GitHub yang berisi ribuan kata Indonesia tunggal
                const response = await fetch('https://raw.githubusercontent.com/indonesia-it/id-words/master/indonesian-words.txt');
                const text = await response.text();
                
                // Pisahkan per baris dan filter:
                // - Hanya kata tunggal (tidak ada spasi atau tanda hubung '-')
                // - Panjang minimal 2 karakter
                dictionary = text.split('\n')
                    .map(word => word.trim().toLowerCase())
                    .filter(word => word.length > 1 && !word.includes(' ') && !word.includes('-'));

                status.innerText = `${dictionary.length.toLocaleString()} Kata Terisi. Mulai mengetik...`;
                gsap.to("#loader", { opacity: 0, pointerEvents: "none", duration: 1 });
            } catch (error) {
                status.innerText = "Gagal memuat database. Pastikan internet aktif.";
                console.error(error);
            }
        }

        // 2. Fungsi Filter Otomatis
        function filterWords() {
            const prefix = document.getElementById('prefix').value.toLowerCase();
            const suffix = document.getElementById('suffix').value.toLowerCase();
            const resultsDiv = document.getElementById('results');
            
            // Bersihkan hasil sebelumnya
            resultsDiv.innerHTML = "";

            if (prefix === "" && suffix === "") return;

            // Logika pencarian
            const filtered = dictionary.filter(word => {
                const matchPrefix = prefix ? word.startsWith(prefix) : true;
                const matchSuffix = suffix ? word.endsWith(suffix) : true;
                return matchPrefix && matchSuffix;
            }).slice(0, 100); // Batasi 100 hasil pertama agar tetap ringan & premium

            // 3. Render Hasil
            filtered.forEach(word => {
                const div = document.createElement('div');
                div.className = 'word-tag';
                div.innerText = word;
                resultsDiv.appendChild(div);
            });

            if (filtered.length === 0) {
                resultsDiv.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">Tidak ada kata tunggal yang ditemukan.</div>`;
            }
        }

        // Event Listeners
        document.getElementById('prefix').addEventListener('input', filterWords);
        document.getElementById('suffix').addEventListener('input', filterWords);

        // Jalankan saat load
        loadDatabase();
    </script>
</body>
</html>
